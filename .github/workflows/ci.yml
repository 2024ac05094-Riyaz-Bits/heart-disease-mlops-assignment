name: Heart Disease CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src tests --max-line-length=100 --extend-ignore=E402,E501,W391

      - name: Prepare model artifacts for tests
        run: |
          python src/models/train_models.py
          python src/models/tune_models.py
          python src/models/package_model.py

      - name: Run unit tests
        run: |
          python -m pytest tests

      - name: Upload model training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-training-artifacts
          path: |
            artifacts/model_training
            artifacts/model_tuning
            artifacts/model_packaging
            models/baseline_best_model.joblib
            models/tuned_best_model.joblib
            models/final_heart_disease_model.joblib
